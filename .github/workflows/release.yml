name: Release

on:
  push:
    tags:
      - "v*"
      - "nonces-v*"
      - "rs-nonces-v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    defaults:
      run:
        working-directory: ts

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Validate tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Type Check
        run: pnpm lint

      - name: Type Check Examples
        run: pnpm --filter @tempo-reconcile/sdk exec tsc --noEmit --project tsconfig.examples.json

      - name: Lint
        run: pnpm lint:eslint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: pnpm --filter @tempo-reconcile/sdk publish --no-git-checks --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-rust:
    name: Publish Rust crate
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crates-io-publish

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - name: Validate tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CRATE_VER=$(grep '^version' tempo-reconcile/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          [ "$TAG" = "$CRATE_VER" ] || { echo "Tag v$TAG != Cargo.toml $CRATE_VER"; exit 1; }
        working-directory: rs

      - name: Test
        run: cargo test --workspace --all-features
        working-directory: rs

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
        working-directory: rs

      - name: Format check
        run: cargo fmt --check
        working-directory: rs

      - name: Doc check
        run: cargo doc --all-features --no-deps
        working-directory: rs
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Semver check
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: tempo-reconcile
          manifest-path: rs/Cargo.toml

      - name: Publish library
        run: cargo publish -p tempo-reconcile
        working-directory: rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish CLI
        # --no-verify: CLI depends on the lib crate just published above;
        # crates.io index lag means verification would fail to resolve it.
        run: cargo publish -p tempo-reconcile-cli --no-verify
        working-directory: rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  build-cli:
    name: CLI binary (${{ matrix.target }})
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tempo-reconcile
            asset: tempo-reconcile-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tempo-reconcile
            asset: tempo-reconcile-macos-arm64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tempo-reconcile
            asset: tempo-reconcile-linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: tempo-reconcile.exe
            asset: tempo-reconcile-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p tempo-reconcile-cli --target ${{ matrix.target }}
        working-directory: rs
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Stage artifact
        shell: bash
        run: |
          cp rs/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  publish-nonces:
    name: Publish @tempo-reconcile/nonces
    if: startsWith(github.ref, 'refs/tags/nonces-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    defaults:
      run:
        working-directory: ts

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Validate tag matches version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/nonces-v}"
          PKG_VERSION=$(node -p "require('./packages/nonces/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag nonces-v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Type Check
        run: pnpm --filter @tempo-reconcile/nonces lint

      - name: Test
        run: pnpm --filter @tempo-reconcile/nonces test

      - name: Build
        run: pnpm --filter @tempo-reconcile/nonces build

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/nonces-v}"
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: pnpm --filter @tempo-reconcile/nonces publish --no-git-checks --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-rust-nonces:
    name: Publish Rust nonces crate
    if: startsWith(github.ref, 'refs/tags/rs-nonces-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: crates-io-publish

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - name: Validate tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF#refs/tags/rs-nonces-v}"
          CRATE_VER=$(grep '^version' nonces/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          [ "$TAG" = "$CRATE_VER" ] || { echo "Tag rs-nonces-v$TAG != Cargo.toml $CRATE_VER"; exit 1; }
        working-directory: rs

      - name: Test
        run: cargo test -p tempo-reconcile-nonces
        working-directory: rs

      - name: Clippy
        run: cargo clippy -p tempo-reconcile-nonces -- -D warnings
        working-directory: rs

      - name: Format check
        run: cargo fmt --check
        working-directory: rs

      - name: Publish
        run: cargo publish -p tempo-reconcile-nonces
        working-directory: rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
