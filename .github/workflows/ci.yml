name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Weekly Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test (workspace)
        run: cargo test --workspace --all-features

      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: rs/lcov.info
          flags: rust

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Fmt
        run: cargo fmt --check

      - name: Doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Semver check
        if: false
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: tempo-reconcile
          manifest-path: rs/Cargo.toml

      - name: Check Rust docs sync
        run: bash scripts/check-rust-docs-sync.sh
        working-directory: ${{ github.workspace }}

  rust-cross:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs
          key: ${{ matrix.os }}

      - name: Test
        run: cargo test --all-features

  rust-msrv:
    name: Rust MSRV (1.84)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.84

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs
          key: msrv

      - name: Test (all features)
        run: cargo test --all-features

  rust-features:
    name: Rust feature combinations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs
          key: features

      - name: No default features (pure memo + reconciler)
        run: cargo test --no-default-features

      - name: Feature rand
        run: cargo test --features rand

      - name: Feature serde
        run: cargo test --features serde

      - name: Feature export
        run: cargo test --features export

      - name: Feature watcher
        run: cargo test --features watcher

      - name: Feature watcher-ws
        run: cargo test --features watcher-ws

      - name: Feature webhook
        run: cargo test --features webhook

      - name: Feature explorer
        run: cargo test --features explorer

  rust-audit:
    name: Rust security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@cargo-audit

      - name: Audit
        run: cargo audit

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    defaults:
      run:
        working-directory: ts

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: ts/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm lint

      - name: Type Check Examples
        if: matrix.node-version == 20
        run: pnpm exec tsc --noEmit --project tsconfig.examples.json

      - name: Format Check
        if: matrix.node-version == 20
        run: pnpm format:check

      - name: Lint
        run: pnpm lint:eslint

      - name: Test + Coverage
        run: pnpm test:coverage

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          directory: ts/coverage

      - name: Build
        run: pnpm build

      - name: Check pack
        run: pnpm pack --dry-run

      - name: Check docs sync
        if: matrix.node-version == 20
        run: bash ../scripts/check-docs-sync.sh

      - name: Security audit
        if: matrix.node-version == 20
        run: pnpm audit --audit-level=high

  stress:
    name: Stress tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: rs

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs

      - name: Stress test (100k events)
        run: cargo test --all-features -- --include-ignored reconciler_handles_100k_events
        timeout-minutes: 5
