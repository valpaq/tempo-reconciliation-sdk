version: 2
updates:
  - package-ecosystem: npm
    directory: /ts
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: []
    commit-message:
      prefix: "deps"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: []
    commit-message:
      prefix: "ci"
