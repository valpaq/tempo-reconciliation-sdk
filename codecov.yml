coverage:
  status:
    project:
      default:
        # Overall project coverage must not drop below 75%
        target: 75%
        threshold: 2%
    patch:
      default:
        # New code in a PR must have at least 80% coverage
        target: 80%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  rust:
    paths:
      - rs/
    carryforward: true
  sdk:
    paths:
      - ts/packages/sdk/src/
    carryforward: true
  nonces:
    paths:
      - ts/packages/nonces/src/
    carryforward: true
